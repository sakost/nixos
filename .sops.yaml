# SOPS configuration for NixOS secrets
# Age keys derived from SSH host keys via ssh-to-age

keys:
  - &sakost-pc age1hctl9v9qq7fcp3qltmxlndhk24d60calvn962ykm4fwkw8d7j4pqushe0g
  - &sakost-user age18vd0kqpadtu3uj8ztha98k4pwfxcgp9z7f5dzeumjkezywzvtgvqzrp6wy

creation_rules:
  # sing-box subscription URL (stored as binary)
  - path_regex: secrets/sing-box-sub-url$
    key_groups:
      - age:
          - *sakost-pc
          - *sakost-user

  # OpenClaw environment file (API keys + tokens)
  - path_regex: secrets/openclaw-env$
    key_groups:
      - age:
          - *sakost-pc
          - *sakost-user
